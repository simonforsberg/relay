spring.application.name=messageService
server.port=8082

spring.grpc.client.channels.userService.address=static://localhost:9091
spring.grpc.client.channels.userService.negotiation-type=plaintext

# PostgreSQL
spring.datasource.url=${MESSAGE_DB_URL:jdbc:postgresql://localhost:5433/messagedb}
spring.datasource.username=${MESSAGE_DB_USERNAME:postgres}
spring.datasource.password=${MESSAGE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT – hämtar public key från Auth Service
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH_SERVICE_JWK_URI:http://127.0.0.1:9000/oauth2/jwks}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# OAuth2 client credentials för service-to-service
spring.security.oauth2.client.registration.authservice.client-id=service-client
spring.security.oauth2.client.registration.authservice.client-secret=${AUTH_SERVICE_CLIENT_SECRET:service-secret}
spring.security.oauth2.client.registration.authservice.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.authservice.scope=user.read

spring.security.oauth2.client.provider.authservice.token-uri=${AUTH_SERVICE_TOKEN_URI:http://127.0.0.1:9000/oauth2/token}