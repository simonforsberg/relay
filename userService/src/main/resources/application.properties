spring.application.name=userService
server.port=8081

# PostgreSQL
spring.datasource.url=${USER_DB_URL:jdbc:postgresql://localhost:5432/userdb}
spring.datasource.username=${USER_DB_USERNAME:postgres}
spring.datasource.password=${USER_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# JWT – hämtar public key från Auth Service
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH_SERVICE_ISSUER_URI:http://127.0.0.1:9000}