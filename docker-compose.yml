services:
  userdb:
    image: postgres
    container_name: userdb
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - userdb-data:/var/lib/postgresql/data

  messagedb:
    image: postgres
    container_name: messagedb
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: messagedb
    ports:
      - "5433:5432"
    volumes:
      - messagedb-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  userdb-data:
  messagedb-data:
  rabbitmq-data: