<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Relay Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0e0f11;
            --surface: #16181c;
            --border: #2a2d33;
            --accent: #4ade80;
            --accent2: #86efac;
            --muted: #6b7280;
            --text: #e5e7eb;
            --radius: 6px;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
        }

        /* ── Header ── */
        header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .logo {
            font-family: var(--mono);
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: -0.02em;
        }

        header .status {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--muted);
            margin-left: auto;
            margin-right: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        header .status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }

        /* ── Message list ── */
        #messages {
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #messages:empty::after {
            content: 'No messages.';
            color: var(--muted);
            font-size: 0.85rem;
            font-family: var(--mono);
            align-self: center;
            margin-top: auto;
            margin-bottom: auto;
        }

        .msg {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            max-width: 72%;
            width: fit-content;
            animation: fadeIn 0.15s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }
        }

        .msg.own {
            align-self: flex-end;
            border-color: #2a3d30;
            background: #131f16;
        }

        .msg .sender {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--accent);
            margin-bottom: 4px;
            text-transform: lowercase;
        }

        .msg.own .sender {
            color: var(--accent2);
        }

        .msg .body {
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text);
        }

        .msg .ts {
            font-family: var(--mono);
            font-size: 0.6rem;
            color: var(--muted);
            margin-top: 4px;
            text-align: right;
            white-space: nowrap;
        }

        /* ── Compose area ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            padding: 10px 14px;
            resize: none;
            min-height: 42px;
            max-height: 120px;
            line-height: 1.4;
            outline: none;
            transition: border-color 0.15s;
        }

        #input:focus {
            border-color: var(--accent);
        }

        #input::placeholder {
            color: var(--muted);
        }

        #send-btn {
            background: var(--accent);
            color: #0a1a0d;
            border: none;
            border-radius: var(--radius);
            font-family: var(--mono);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 10px 18px;
            cursor: pointer;
            height: 42px;
            transition: background 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        #send-btn:hover {
            background: var(--accent2);
        }

        #send-btn:active {
            opacity: 0.75;
        }

        #send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Logout ── */
        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--muted);
            font-family: var(--mono);
            font-size: 0.7rem;
            padding: 5px 10px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .logout-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ── Error toast ── */
        #error {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #3b1212;
            border: 1px solid #7f1d1d;
            color: #fca5a5;
            font-family: var(--mono);
            font-size: 0.75rem;
            padding: 8px 16px;
            border-radius: var(--radius);
            z-index: 99;
        }

        #error.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">relay/</div>
    <div class="status">
        <span class="dot"></span>
        <span id="who"></span>
    </div>
    <form action="/logout" method="post">
        <button type="submit" class="logout-btn">log out</button>
    </form>
</header>

<div id="messages"></div>

<footer>
    <textarea id="input" placeholder="Write a message…" rows="1"></textarea>
    <button id="send-btn">send</button>
</footer>

<div id="error"></div>

<script>
    let currentUser = null;

    async function init() {
        try {
            const res = await fetch('/api/users/me');
            if (res.status === 401 || res.status === 302) {
                window.location.href = '/oauth2/authorization/authservice';
                return;
            }
            const user = await res.json();
            currentUser = user.username ?? user.sub ?? user.email ?? 'du';
            document.getElementById('who').textContent = currentUser;
        } catch (e) {
            showError('Could not fetch user: ' + e.message);
        }
        await loadMessages();
    }

    async function loadMessages() {
        try {
            const res = await fetch('/api/messages');
            if (!res.ok) throw new Error(res.status);
            const messages = await res.json();
            const list = document.getElementById('messages');
            list.innerHTML = '';
            messages.forEach(renderMessage);
        } catch (e) {
            showError('Could not fetch messages: ' + e.message);
        }
    }

    function renderMessage(msg) {
        const list = document.getElementById('messages');
        const div = document.createElement('div');
        const isOwn = msg.senderId === currentUser || msg.sender === currentUser;
        div.className = 'msg' + (isOwn ? ' own' : '');

        const sender = msg.senderId ?? msg.sender ?? 'unknown';
        const body   = msg.content ?? msg.text ?? msg.body ?? '';
        const time = msg.createdAt
            ? new Date(msg.createdAt).toLocaleString('sv-SE', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            })
            : '';

        div.innerHTML = `
            <div class="sender">${esc(sender)}</div>
            <div class="body">${esc(body)}</div>
            ${time ? `<div class="ts">${time}</div>` : ''}
        `;
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('input');
        const btn   = document.getElementById('send-btn');
        const text  = input.value.trim();
        if (!text) return;

        btn.disabled = true;
        try {
            const res = await fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: text })
            });
            if (!res.ok) throw new Error(res.status);
            const msg = await res.json();
            input.value = '';
            input.style.height = 'auto';
            renderMessage(msg);
        } catch (e) {
            showError('Could not send: ' + e.message);
        } finally {
            btn.disabled = false;
            input.focus();
        }
    }

    document.getElementById('input').addEventListener('input', function () {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    document.getElementById('send-btn').addEventListener('click', sendMessage);

    function showError(msg) {
        const el = document.getElementById('error');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    init();
</script>
</body>
</html>
